<!-- Login page sits outside layout — no sidebar/header -->
<div class="d-flex flex-column flex-root" style="height: 100vh !important;">
  <div class="d-flex flex-column flex-lg-row flex-column-fluid">

    <!-- Left: Form Side -->
    <div class="d-flex flex-column flex-lg-row-fluid w-lg-50 p-10 order-2 order-lg-1">
      <div class="d-flex flex-center flex-column flex-lg-row-fluid">
        <div class="w-lg-500px p-10">

          <!-- Logo -->
          <div class="text-center mb-11">
            <a href="#">
              <img src="assets/fabicon-1.png" class="h-60px mb-5" alt="Fab WIP" />
            </a>
            <h1 class="text-dark fw-bolder mb-3">Sign In to Fab WIP</h1>
            <div class="text-gray-500 fw-semibold fs-6">
              Enter your credentials to continue
            </div>
          </div>

          <!-- Spinner -->
          <ngx-spinner
            bdColor="rgba(0,0,0,0.8)"
            size="medium"
            color="#fff"
            type="ball-scale-multiple"
            [fullScreen]="false">
            <p style="color:white">Loading...</p>
          </ngx-spinner>

          <!-- Sign In Form -->
          <form novalidate #loginForm="ngForm" (ngSubmit)="onSubmit()">

            <!-- Username -->
            <div class="fv-row mb-8">
              <input
                type="email"
                class="form-control bg-transparent"
                placeholder="Email / Username"
                name="loginName"
                #loginName="ngModel"
                [(ngModel)]="data.loginName"
                autocomplete="off"
                required
                [ngClass]="{
                  'is-valid': loginName.valid && loginName.touched,
                  'is-invalid': loginName.invalid && loginName.touched
                }"
              />
              <div *ngIf="loginName.touched && loginName.errors?.['required']"
                class="fv-plugins-message-container invalid-feedback">
                Username is required
              </div>
            </div>

            <!-- Password -->
            <div class="fv-row mb-3" style="position:relative">
              <input
                [type]="passwordFieldType"
                class="form-control bg-transparent"
                placeholder="Password"
                name="password"
                #password="ngModel"
                [(ngModel)]="data.password"
                autocomplete="off"
                required
                [ngClass]="{
                  'is-valid': password.valid && password.touched,
                  'is-invalid': password.invalid && password.touched
                }"
              />
              <!-- Eye toggle -->
              <span
                (click)="togglePasswordVisibility()"
                style="position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;color:#a1a5b7">
                <i class="fa-solid fs-4"
                  [ngClass]="{
                    'fa-eye': !isPasswordVisible,
                    'fa-eye-slash': isPasswordVisible
                  }">
                </i>
              </span>
              <div *ngIf="password.touched && password.errors?.['required']"
                class="fv-plugins-message-container invalid-feedback">
                Password is required
              </div>
            </div>

            <!-- Remember + Forgot -->
            <div class="d-flex flex-stack flex-wrap gap-3 fs-base fw-semibold mb-8">
              <label class="form-check form-check-custom form-check-solid">
                <input class="form-check-input" type="checkbox" name="remember" />
                <span class="form-check-label text-gray-700 fw-semibold fs-7">
                  Remember me
                </span>
              </label>
              <a href="javascript:;" class="link-primary">Forgot Password?</a>
            </div>

            <!-- Submit -->
            <div class="d-grid mb-10">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="loginForm.invalid">
                <span class="indicator-label">Sign In</span>
              </button>
            </div>

          </form>

        </div>
      </div>

      <!-- Footer links -->
      <div class="w-lg-500px d-flex flex-stack px-10 mx-auto">
        <div class="d-flex fw-semibold text-primary fs-base gap-5">
          <a href="javascript:;">Terms</a>
          <a href="javascript:;">Contact Us</a>
        </div>
      </div>
    </div>
    <!-- End Left -->

    <!-- Right: Background / Branding Side -->
    <div class="d-flex flex-lg-row-fluid w-lg-50 bgi-size-cover bgi-position-center order-1 order-lg-2"
      style="background-image: url(assets/media/misc/auth-bg.png)">
      <div class="d-flex flex-column flex-center py-7 py-lg-15 px-5 px-md-15 w-100">

        <img
          alt="FabIntel Logo"
          src="assets/FabIndustries-logo.png"
          class="h-60px h-lg-75px mb-10" />

        <img
          class="d-none d-lg-block mx-auto w-275px w-md-50 w-xl-450px mb-10"
          src="assets/media/misc/auth-screens.png"
          alt="" />

        <h1 class="d-none d-lg-block text-white fs-2qx fw-bolder text-center mb-7">
          Fabl WIP — Garment Manufacturing ERP
        </h1>
        <div class="d-none d-lg-block text-white fs-base text-center">
          Garment Manufacturing — Cutting · Bundles · Floor · QC · Dispatch
        </div>

      </div>
    </div>
    <!-- End Right -->

  </div>
</div>
