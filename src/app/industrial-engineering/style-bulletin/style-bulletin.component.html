<div class="fi-page">

  <div class="fi-toolbar">
    <div class="fi-search-wrap">
      <i class="ti ti-search fi-search-icon" aria-hidden="true"></i>
      <input class="fi-search" style="width:280px" type="text"
        placeholder="Search customer, style, article…"
        (input)="onFilterField($any($event.target).value)" />
    </div>
    <div class="fi-toolbar-right">
      <button class="fi-btn fi-btn-outline" (click)="get()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Refresh
      </button>
      <button *ngIf="canAdd$ | async" class="fi-btn fi-btn-primary" (click)="add()">
        <i class="ti ti-plus" aria-hidden="true"></i> Add Style Bulletin
      </button>
    </div>
  </div>

  <div class="fi-card">
    <div class="fi-loading" *ngIf="loadingIndicator">
      <span class="fi-spinner" aria-hidden="true"></span> Loading…
    </div>

    <div class="fi-table-wrap" *ngIf="!loadingIndicator">
      <table class="fi-table">
        <thead>
          <tr>
            <th style="width:130px">Code</th>
            <th>Customer</th>
            <th>Article</th>
            <th>Style</th>
            <th style="width:90px">Version</th>
            <th style="width:130px">Effective</th>
            <th style="width:110px;text-align:right;padding-right:16px">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of gridView">
            <td>
              <span class="fi-badge fi-badge-blue"
                style="display:inline-block;min-width:90px;text-align:center">
                {{ row.code }}
              </span>
            </td>
            <td class="fi-cell-primary">{{ row.customerName }}</td>
            <td class="fi-cell-muted">{{ row.articleName }}</td>
            <td class="fi-cell-muted">{{ row.styleName }}</td>
            <td class="fi-cell-muted">{{ row.versionNo }}</td>
            <td class="fi-cell-muted">{{ row.effectiveFrom | date:'dd-MMM-yyyy' }}</td>
            <td style="text-align:right;padding-right:16px">
              <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
                <button class="fi-icon-btn fi-icon-btn-sm" title="Print PDF"
                  (click)="print(row)" aria-label="Print">
                  <i class="ti ti-file-type-pdf" style="color:#16a34a" aria-hidden="true"></i>
                </button>
                <button class="fi-icon-btn fi-icon-btn-sm"
                  (click)="edit(row)" aria-label="Edit">
                  <i class="ti ti-pencil" aria-hidden="true"></i>
                </button>
                <button *ngIf="canDelete$ | async"
                  class="fi-icon-btn fi-icon-btn-sm fi-icon-btn-danger"
                  (click)="onDelete(row)" aria-label="Delete">
                  <i class="ti ti-trash" aria-hidden="true"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="!gridView.length">
            <td colspan="7" class="fi-table-empty">
              <i class="ti ti-file-description" aria-hidden="true"></i>
              No style bulletins found
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="fi-table-footer" *ngIf="!loadingIndicator && gridView.length">
      {{ gridView.length }} record{{ gridView.length === 1 ? '' : 's' }}
    </div>
  </div>
</div>
